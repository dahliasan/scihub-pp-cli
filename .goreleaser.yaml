version: 2
project_name: scihub-pp-cli
changelog:
  disable: true
builds:
  - id: scihub-pp-cli
    main: ./cmd/scihub-pp-cli
    binary: scihub-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X scihub-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: scihub-pp-mcp
    main: ./cmd/scihub-pp-mcp
    binary: scihub-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: scihub-pp-cli
    repository:
      owner: dahlia
      name: homebrew-tap
    homepage: "https://github.com/dahlia/scihub-pp-cli"
    description: "Agent-native DOI to PDF fetcher with mirror discovery, probe, and resumable batch jobs."
    install: |
      bin.install "scihub-pp-cli"
      bin.install "scihub-pp-mcp"
